# iam-os dev appliance iSCSI target (Linux SCSI target / tgt)
# Install on the PXE host at /etc/tgt/conf.d/iam-os.conf
#
#   sudo cp etc/iam-os/tgt-iam-os.conf /etc/tgt/conf.d/iam-os.conf
#   sudo systemctl enable --now tgt
#   sudo tgt-admin --update ALL
#   sudo tgtadm --mode target --op show
#
# Served read-write so the diskless client gets a fully writable appliance.
<target iqn.2026-06.nl.omiximo:iam-os-dev>
    backing-store /srv/iam-os/iam-os-dev.img
    # LAN initiators + the local KVM PXE-test subnet
    initiator-address 192.168.0.0/24
    initiator-address 10.123.0.0/24
    write-cache off
</target>
